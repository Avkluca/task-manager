services:
  backend:
    build:
      context: ./backend
    container_name: task-manager-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE:-taskmanagerdb}
      COSMOS_CONTAINER: ${COSMOS_CONTAINER:-tasks}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000/api/tasks
    container_name: task-manager-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
